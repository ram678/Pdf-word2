<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Word Converter</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/docx@7.7.0/build/index.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

</head>

<body>

<div class="container">

<h1>PDF ⇄ Word Converter</h1>

<div class="card">

<h2>PDF → Word</h2>

<div class="drop-area" id="pdfDrop">
Drag & Drop PDF or Click
<input type="file" id="pdfFile" accept=".pdf">
</div>

<button onclick="pdfToWord()">Convert</button>

</div>


<div class="card">

<h2>Word → PDF</h2>

<div class="drop-area">
<input type="file" id="wordFile" accept=".docx">
</div>

<button onclick="wordToPdf()">Convert</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
